name: Run pipeline 🚀

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Set up python
        uses: actions/setup-python@v6
        with: 
          python-version: '3.12'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: '0.11.16'
      
      - name: Install dependencies
        run: uv sync --no-dev --locked

      - name: Run dlt pipelines
        env:
          FROST_CLIENT_ID: ${{ secrets.FROST_CLIENT_ID }}
          DESTINATION__MOTHERDUCK__CREDENTIALS__DATABASE: ${{ vars.MOTHERDUCK_DATABASE }}
          DESTINATION__MOTHERDUCK__CREDENTIALS__PASSWORD: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          source .venv/bin/activate
          python main.py

      - name: Run SQLmesh transforms
        env:
          DESTINATION__MOTHERDUCK__CREDENTIALS__DATABASE: ${{ vars.MOTHERDUCK_DATABASE }}
          DESTINATION__MOTHERDUCK__CREDENTIALS__PASSWORD: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          source .venv/bin/activate
          sqlmesh run